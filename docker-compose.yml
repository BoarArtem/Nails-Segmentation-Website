services:
  postgres:
    image: postgres:16
    container_name: nails_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nails_user
      POSTGRES_PASSWORD: nails_password
      POSTGRES_DB: nails_segmentation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nails_user -d nails_segmentation"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: nails_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
